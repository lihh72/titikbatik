<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Titik Batik Admin</title>
    <link rel="stylesheet" href="/admin/static/admin.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">TB</div>
          <div>
            <h1>Titik Batik</h1>
            <p>Admin Generator</p>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-item is-active" data-view="dashboard" type="button">Dashboard</button>
          <button class="nav-item" data-view="generate" type="button">Generate</button>
          <button class="nav-item" data-view="templates" type="button">Model</button>
          <button class="nav-item" data-view="batches" type="button">Batch</button>
          <button class="nav-item" data-view="results" type="button">Hasil</button>
        </nav>

        <section class="key-panel">
          <label for="adminKey">Admin Key</label>
          <div class="key-row">
            <input id="adminKey" type="password" autocomplete="off" placeholder="X-Admin-Key" />
            <button id="saveKey" class="icon-button" type="button" title="Simpan key">Save</button>
          </div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="viewTitle">Dashboard</h2>
            <p id="statusLine">Memuat status...</p>
          </div>
          <div class="topbar-actions">
            <button id="refreshAll" class="button secondary" type="button">Refresh</button>
            <a class="button ghost" href="/docs" target="_blank" rel="noreferrer">Swagger</a>
          </div>
        </header>

        <section id="dashboard" class="view is-visible">
          <div class="metric-grid">
            <article class="metric">
              <span>Total Batik</span>
              <strong id="metricTotalBatik">0</strong>
            </article>
            <article class="metric">
              <span>Published</span>
              <strong id="metricPublishedBatik">0</strong>
            </article>
            <article class="metric">
              <span>Queued</span>
              <strong id="metricQueued">0</strong>
            </article>
            <article class="metric">
              <span>Running</span>
              <strong id="metricRunning">0</strong>
            </article>
            <article class="metric">
              <span>Failed</span>
              <strong id="metricFailed">0</strong>
            </article>
            <article class="metric">
              <span>ComfyUI</span>
              <strong id="metricComfyUI">-</strong>
            </article>
          </div>
        </section>

        <section id="generate" class="view">
          <form id="generateForm" class="form-grid">
            <label>
              Jumlah
              <input name="amount" type="number" min="1" max="500" value="1" required />
            </label>
            <label>
              Mode Prompt
              <select name="mode">
                <option value="random">Random</option>
                <option value="mixed">Mixed</option>
                <option value="fixed">Fixed</option>
              </select>
            </label>
            <label>
              Combine
              <select name="combine_enabled">
                <option value="true">Aktif</option>
                <option value="false">Mati</option>
              </select>
            </label>
            <label>
              Video
              <select name="video_enabled">
                <option value="false">Mati</option>
                <option value="true">Aktif</option>
              </select>
            </label>
            <label>
              Mode Model
              <select name="costume_template_mode">
                <option value="all">Semua model aktif</option>
                <option value="random_one">Random satu model</option>
                <option value="selected">Model terpilih</option>
                <option value="none">Tanpa costume</option>
              </select>
            </label>
            <label>
              Seed Prompt
              <input name="random_seed" type="number" placeholder="Opsional" />
            </label>
            <label>
              Duplicate Prompt
              <select name="allow_duplicate_prompts">
                <option value="false">Cegah</option>
                <option value="true">Izinkan</option>
              </select>
            </label>
            <label class="full-span">
              Pilih Model
              <select id="templateSelect" name="costume_template_ids" multiple size="4"></select>
            </label>
            <div class="full-span form-actions">
              <button class="button primary" type="submit">Queue Batch</button>
              <button id="reloadTemplatesFromGenerate" class="button secondary" type="button">Refresh Model</button>
            </div>
          </form>
        </section>

        <section id="templates" class="view">
          <form id="templateUploadForm" class="upload-panel">
            <label>
              Nama Model
              <input name="name" type="text" placeholder="Model Kaos Putih" required />
            </label>
            <label>
              Deskripsi
              <input name="description" type="text" placeholder="Opsional" />
            </label>
            <label>
              Urutan
              <input name="sort_order" type="number" value="10" />
            </label>
            <label>
              File Model
              <input name="file" type="file" accept="image/*" required />
            </label>
            <button class="button primary" type="submit">Upload Model</button>
          </form>
          <div id="templateGrid" class="template-grid"></div>
        </section>

        <section id="batches" class="view">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Batch</th>
                  <th>Status</th>
                  <th>Progress</th>
                  <th>Queued</th>
                  <th>Running</th>
                  <th>Done</th>
                  <th>Failed</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="batchRows"></tbody>
            </table>
          </div>
          <div id="jobPanel" class="job-panel"></div>
        </section>

        <section id="results" class="view">
          <div class="results-toolbar">
            <label>
              Jumlah tampil
              <select id="resultLimit">
                <option value="12">12</option>
                <option value="24" selected>24</option>
                <option value="50">50</option>
              </select>
            </label>
            <button id="refreshResults" class="button secondary" type="button">Refresh Hasil</button>
          </div>
          <div id="resultGrid" class="result-grid"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="/admin/static/admin.js"></script>
  </body>
</html>
